<title>Font Maker</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', system-ui, sans-serif; background: #f0f0f0; overflow: hidden; height: 100dvh; }
  #root { height: 100dvh; }
  ::-webkit-scrollbar { display: none; }

    .bscreen{display:flex;flex-direction:column;height:100dvh;background:#f0f4ff;}
    .bhdr{background:#1a0a5c;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .bbody{flex:1;overflow:auto;padding:14px;}
    .bc{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 10px #0001;}
    .bc h3{font-size:14px;font-weight:700;color:#1a0a5c;margin-bottom:10px;}
    .srow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .srow label{font-size:13px;color:#555;min-width:120px;font-weight:600;}
    .srow input[type=range]{flex:1;accent-color:#4f8ef7;}
    .srow span{font-size:13px;color:#4f8ef7;font-weight:700;min-width:50px;text-align:right;}
    .gbtn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
    .gbtn:disabled{opacity:0.4;cursor:not-allowed;}
    .pvtext{font-size:34px;line-height:2.2;word-break:break-all;min-height:60px;}
    .bst{font-size:13px;padding:8px;text-align:center;color:#666;}
    .bst.ok{color:#10b981;font-weight:700;}
    .bst.err{color:#e53e3e;}
    .pgbar{height:4px;background:#e0e8ff;border-radius:2px;margin-bottom:8px;}
    .pgfill{height:100%;background:#4f8ef7;border-radius:2px;width:0;transition:width 0.3s;}
  </style>

  <script id="py-build" type="text/plain">import json,math,base64,io

def make_glyph(paths,cp,ch,isMark=False,gname=None,extraY=0,sarabunAdv=None,sarabunLsb=None):
    allX=[fx(p['x']) for path in paths for p in path]
    allY=[fy(p['y']) for path in paths for p in path]
    if not allX: return None,None,None
    sp=spacing_data.get(ch,{})
    if isMark:
        ax,ay,cls_=mark_anchors.get(gname,(-74,576,1))
        # X: วาง anchor X ของ glyph ที่วาดให้ตรงกับ ax ของ Sarabun
        # ใช้ xMax ของ drawn เป็น anchor point (Sarabun mark anchor อยู่ที่ xMax เสมอ —

        shiftX=max(allX)-ax
        # Y: center ของ mark ตรงกับ anchor y
        midY=(min(allY)+max(allY))/2
        shiftY=midY-ay
        sc=1.0;extraY=0

    elif cp in LEADING_VOWELS:

        isNarrow=gw<NARROW_WIDTH

        lsb=sp.get('lsb',default_lsb)
        shiftX=min(allX)-lsb
        shiftY=0;sc=1.0
        rsb=sp.get('rsb',None)
    pen=TTGlyphPen(None);drew=False
    for path in paths:
        pts=path
        if len(pts)<2:
            cx=round((fx(pts[0]['x'])-shiftX)*sc);cy=round((fy(pts[0]['y'])-shiftY)*sc+extraY);r=20
            pen.moveTo((cx+r,cy));pen.lineTo((cx,cy+r));pen.lineTo((cx-r,cy));pen.lineTo((cx,cy-r));pen.closePath();drew=True;continue
        ns=[]
        for i in range(len(pts)-1):

        bot=[(round((fx(pts[i]['x'])-shiftX)*sc-ns[i][0]*sw),round((fy(pts[i]['y'])-shiftY)*sc+ns[i][1]*sw+extraY)) for i in range(len(pts)-1,-1,-1)]
        cl=[]

        pen.moveTo(cl[0])

    try: return pen.glyph(),lsb,rsb

def _build_tone_nik_combo(tone_gname, nik_gname):
    g_tone=glyf_table.get(tone_gname); g_nik=glyf_table.get(nik_gname)
    if not g_tone or not g_nik: return None
    _, nik_ymax  = _coords_bounds(g_nik)
    tone_ymin, _ = _coords_bounds(g_tone)
    nik_ymax  = nik_ymax  or 896
    tone_ymin = tone_ymin or 689
    shift_y   = int((nik_ymax + SMALL_GAP) - tone_ymin)
    print(f"    combo: nik_ymax={nik_ymax} tone_ymin={tone_ymin} shift={shift_y}")
    pen2=TTGlyphPen(None); drew=False
    def _draw(g, dx=0, dy=0):
        nonlocal drew
        if not (hasattr(g,'numberOfContours') and g.numberOfContours and g.numberOfContours>0): return
        ends=g.endPtsOfContours; start=0
        for end in ends:
            pts=[(x+dx,y+dy) for x,y in g.coordinates[start:end+1]]
            pen2.moveTo(pts[0])
            for p in pts[1:]: pen2.lineTo(p)
            pen2.closePath(); drew=True; start=end+1
    _draw(g_nik,  0,       0)
    _draw(g_tone, 0, shift_y)
    if not drew: return None
    try: return pen2.glyph()
    except: return None

if _drawn_tones and _gname_nik and _gname_nik in glyf_table:
    for cp_t, gname_t in _drawn_tones.items():
        cp_hex_t = f'{cp_t:04X}'
        for combo_gname in font.getGlyphOrder():
            base_upper = combo_gname.split('.')[0].upper()
            if cp_hex_t in base_upper and '0E4D' in base_upper and combo_gname != gname_t:
                g_combo = _build_tone_nik_combo(gname_t, _gname_nik)
                glyf_table[combo_gname] = g_combo if g_combo else _copy.deepcopy(glyf_table[gname_t])
                hmtx[combo_gname] = (0, hmtx.get(gname_t,(0,0))[1])
                print(f"  combo built: {chr(cp_t)}({gname_t}) + ํ → {combo_gname}")
        # copy วรรณยุกต์ไปยัง combo ที่มี sara am (0E33) ด้วย
        for combo_gname in font.getGlyphOrder():
            base_upper = combo_gname.split('.')[0].upper()
            if cp_hex_t in base_upper and '0E33' in base_upper and combo_gname != gname_t:
                glyf_table[combo_gname] = _copy.deepcopy(glyf_table[gname_t])
                hmtx[combo_gname] = (0, hmtx.get(gname_t,(0,0))[1])
                print(f"  combo copy (am): {chr(cp_t)}({gname_t}) → {combo_gname}")
# ─── Sara Am (ำ U+0E33) — restore original so GSUB decompose works ──────────
# ค้ำ = ค + ้ + ำ  →  GSUB decomposes ำ → ํ + า
# วรรณยุกต์ ้ then stacks above ํ via GPOS (not blocked by drawn ำ shape).
# Fix: if user drew both ํ (0E4D) AND า (0E32), restore original Sarabun ำ
# so that GSUB decomposition kicks in and uses the drawn ํ/า glyphs.
CP_SARA_AM  = 0x0E33
CP_NIKHAHIT = 0x0E4D
CP_SARA_A   = 0x0E32
gname_am  = cmap.get(CP_SARA_AM)
gname_nik = cmap.get(CP_NIKHAHIT)
gname_aa  = cmap.get(CP_SARA_A)
has_drawn_nik = bool(gname_nik and chr(CP_NIKHAHIT) in glyphs_data and glyphs_data[chr(CP_NIKHAHIT)])
has_drawn_aa  = bool(gname_aa  and chr(CP_SARA_A)   in glyphs_data and glyphs_data[chr(CP_SARA_A)])
if gname_am and has_drawn_nik and has_drawn_aa:
    orig_tmp = TTFont(io.BytesIO(base64.b64decode(js.sarabunB64)))
    glyf_table[gname_am] = orig_tmp['glyf'][gname_am]
    hmtx[gname_am]       = orig_tmp['hmtx'].metrics[gname_am]
    print("ำ restored to Sarabun original — GSUB will decompose ำ→ํ+า, วรรณยุกต์ will clear")
# ─────────────────────────────────────────────────────────────────────────────
# DEFAULT_RSB_REDUCE: bake -8px letter-spacing เข้า font
# = 222 units at 36px, ใช้ 200 เป็น round number
DEFAULT_RSB_REDUCE = 200
MARK_ADV_ZERO = MARK_CPS  # mark glyphs มี advance=0 อยู่แล้ว

# save ครั้งแรกเพื่อให้ xMin/xMax ถูก compute
buf1=io.BytesIO();font.save(buf1);buf1.seek(0)
font2=TTFont(buf1)

# ─── Fix hmtx.lsb for CUSTOM-DRAWN MARKS (สระ/วรรณยุกต์ลอย) ──────────────────
# บั๊กจริง: ตอนวาดสระ/วรรณยุกต์ใหม่ โค้ดข้างบนอัปเดต hmtx (advance/lsb) เฉพาะ
# ตัวอักษรปกติ (isMark=False) เท่านั้น — สระ/วรรณยุกต์ที่วาดใหม่ (isMark=True)
# ไม่เคยอัปเดต hmtx.lsb เลย มันเลยยังเป็นค่า lsb ของ Sarabun ต้นฉบับ ทั้งที่กลิฟ
# (glyf outline) ถูกแทนที่เป็นรูปที่วาดใหม่ทั้งหมดแล้ว (คนละตำแหน่ง คนละความกว้าง)
# ตัว renderer จริง (FreeType/เบราว์เซอร์) คำนวณตำแหน่งกลิฟจาก "phantom points"
# ที่อิงจาก hmtx.lsb ไม่ใช่จาก glyf.xMin ตรงๆ — พอสอง ค่านี้ไม่ตรงกัน กลิฟที่ render
# จริงเลยเยื้อง (มักไปทางซ้าย) แม้ตัวเลข anchor/GPOS จะถูกต้องหมดแล้วก็ตาม
# นี่คือสาเหตุจริงของอาการ "เยื้องไปข้างหน้า" ที่ยังไม่หายแม้แก้ anchor และ guide แล้ว
_glyf2_for_hmtx = font2['glyf']
_hmtx2_for_fix = font2['hmtx']
_fixed_mark_gnames = set()
for _ch8 in glyphs_data:
    if not glyphs_data.get(_ch8): continue
    _cp8 = ord(_ch8)
    if _cp8 not in MARK_CPS: continue
    _gn8 = cmap.get(_cp8)
    if not _gn8: continue
    for _variant8 in [_gn8, _gn8+'.small', _gn8+'.narrow']:
        if _variant8 in _fixed_mark_gnames: continue
        _gg8 = _glyf2_for_hmtx.get(_variant8)
        if not _gg8 or not hasattr(_gg8,'xMin') or _gg8.xMin is None: continue
        _old_adv8, _old_lsb8 = _hmtx2_for_fix.metrics.get(_variant8, (0,0))
        if _old_lsb8 != _gg8.xMin:
            print(f"  fix hmtx.lsb {_variant8}: lsb {_old_lsb8} -> {_gg8.xMin} (glyf.xMin)")
            _hmtx2_for_fix.metrics[_variant8] = (0, _gg8.xMin)
        _fixed_mark_gnames.add(_variant8)
# ─────────────────────────────────────────────────────────────────────────────

# ─── Fix mark-attachment anchors for CUSTOM-DRAWN CONSONANTS (base glyphs) ───
# ปกติจุดที่บอกว่า "สระ/วรรณยุกต์ลอยตรงไหน" เหนือ/ใต้พยัญชนะ เป็นพิกัดคงที่จาก
# รูปพยัญชนะเดิมของ Sarabun (เช่น ก ต้นฉบับ) — ถ้าเราวาดพยัญชนะเองใหม่ สัดส่วน/
# ทรงจะไม่เหมือนเดิม จุดแขวนก็เยื้อง/ลอยผิดที่ตามไปด้วย (นี่คือสาเหตุหลักที่สระ/
# วรรณยุกต์เยื้อง แม้จะปรับกลิฟของสระ/วรรณยุกต์เองแล้วก็ตาม — เพราะสระ/วรรณยุกต์
# เองอยู่ตรงกันดีอยู่แล้ว แต่จุดที่พยัญชนะบอกให้ไปลอยตรงไหนมันยังเป็นค่าเดิม)
# แก้โดยคำนวณ "สัดส่วนตำแหน่งเดิม" ของ anchor ในกรอบกลิฟเดิม แล้ว map สัดส่วน
# เดียวกันไปยังกรอบกลิฟที่วาดใหม่จริง
_orig_font_ratio = TTFont(io.BytesIO(base64.b64decode(js.sarabunB64)))
_orig_glyf_ratio  = _orig_font_ratio['glyf']
_drawn_base_gnames = set()
for _ch7 in glyphs_data:
    if not glyphs_data.get(_ch7): continue
    _cp7 = ord(_ch7)
    if _cp7 in MARK_CPS or _cp7 in LEADING_VOWELS: continue
    _gn7 = cmap.get(_cp7)
    if _gn7: _drawn_base_gnames.add(_gn7)

for _lk7 in font2['GPOS'].table.LookupList.Lookup:
    if _lk7.LookupType != 4: continue
    for _sub7 in _lk7.SubTable:
        if not hasattr(_sub7, 'BaseCoverage'): continue
        for _bi7, _bgname7 in enumerate(_sub7.BaseCoverage.glyphs):
            if _bgname7 not in _drawn_base_gnames: continue
            _g_orig7 = _orig_glyf_ratio.get(_bgname7)
            _g_new7  = font2['glyf'].get(_bgname7)
            if not _g_orig7 or not hasattr(_g_orig7,'xMax') or _g_orig7.xMax is None: continue
            if not _g_new7  or not hasattr(_g_new7,'xMax')  or _g_new7.xMax  is None: continue
            _ow7=(_g_orig7.xMax-_g_orig7.xMin) or 1; _oh7=(_g_orig7.yMax-_g_orig7.yMin) or 1
            _nw7=(_g_new7.xMax-_g_new7.xMin) or 1;   _nh7=(_g_new7.yMax-_g_new7.yMin) or 1
            _brec7 = _sub7.BaseArray.BaseRecord[_bi7]
            for _ci7, _anc7 in enumerate(_brec7.BaseAnchor):
                if not _anc7: continue
                _rx=(_anc7.XCoordinate-_g_orig7.xMin)/_ow7
                _old_x7,_old_y7=_anc7.XCoordinate,_anc7.YCoordinate
                _anc7.XCoordinate=int(round(_g_new7.xMin+_rx*_nw7))
                if _ci7==1:
                    # class 1 = above-attaching anchor: ให้ระยะห่างจริงเหนือกลิฟที่วาด
                    # (เดิมใช้สัดส่วนล้วนๆ ทำให้กลิฟที่วาดสั้น/กระชับ ได้ระยะห่างน้อยเกินไป
                    #  สระ/วรรณยุกต์เลยลอยต่ำเกือบชิดตัวพยัญชนะ)
                    _clear7 = max(round(0.26*_nh7), 22)
                    _anc7.YCoordinate = _g_new7.yMax + _clear7 + 60
                else:
                    _ry=(_anc7.YCoordinate-_g_orig7.yMin)/_oh7
                    _anc7.YCoordinate=int(round(_g_new7.yMin+_ry*_nh7))
                print(f"  fix base-anchor {_bgname7}: ({_old_x7},{_old_y7}) -> ({_anc7.XCoordinate},{_anc7.YCoordinate})")
del _orig_font_ratio
# ─────────────────────────────────────────────────────────────────────────────

# ─── ลดวรรณยุกต์ (เอก โท ตรี จัตวา) ลง 30 หน่วย แยกจากสระ ─────────────────────
# ตำแหน่ง Y สุดท้าย = BaseAnchor.Y (บนพยัญชนะ/สระ) - MarkAnchor.Y (บนตัววรรณยุกต์เอง)
# ต้องการให้วรรณยุกต์ต่ำกว่าสระ 30 หน่วย โดยไม่กระทบสระ — แก้ที่ MarkAnchor.Y ของ
# วรรณยุกต์เองแทน (เพิ่มขึ้น 30 ทำให้ผลลัพธ์ตำแหน่งสุดท้ายต่ำลง 30)
# หมายเหตุ: วรรณยุกต์ตัว .small บางกรณี (เช่น ซ้อนบนสระอี) ไม่ได้แขวนกับพยัญชนะ
# ตรงๆผ่าน mark-to-base (type4) แต่แขวนกับตัวสระเองผ่าน mark-to-mark (type6)
# ต้องแก้ทั้งสองกลไกถึงจะครอบคลุมทุกกรณีจริง
_TONE_CPS_FIX = {0x0E48,0x0E49,0x0E4A,0x0E4B}
_tone_gnames_fix = set()
for _cp9 in _TONE_CPS_FIX:
    _gn9 = cmap.get(_cp9)
    if not _gn9: continue
    for _variant9 in [_gn9, _gn9+'.small', _gn9+'.narrow']:
        _tone_gnames_fix.add(_variant9)

for _lk9 in font2['GPOS'].table.LookupList.Lookup:
    if _lk9.LookupType == 4:
        for _sub9 in _lk9.SubTable:
            if not hasattr(_sub9, 'MarkCoverage'): continue
            for _mi9, _mgname9 in enumerate(_sub9.MarkCoverage.glyphs):
                if _mgname9 not in _tone_gnames_fix: continue
                _mrec9 = _sub9.MarkArray.MarkRecord[_mi9]
                _anc9 = _mrec9.MarkAnchor
                if not _anc9: continue
                _old_y9 = _anc9.YCoordinate
                _anc9.YCoordinate = _old_y9 + 30
                print(f"  lower tone (mark-to-base) {_mgname9}: markAnchor.Y {_old_y9} -> {_anc9.YCoordinate}")
    elif _lk9.LookupType == 6:
        for _sub9 in _lk9.SubTable:
            if not hasattr(_sub9, 'Mark1Coverage'): continue
            for _mi9, _mgname9 in enumerate(_sub9.Mark1Coverage.glyphs):
                if _mgname9 not in _tone_gnames_fix: continue
                _mrec9 = _sub9.Mark1Array.MarkRecord[_mi9]
                _anc9 = _mrec9.MarkAnchor
                if not _anc9: continue
                _old_y9 = _anc9.YCoordinate
                _anc9.YCoordinate = _old_y9 + 30
                print(f"  lower tone (mark-to-mark) {_mgname9}: markAnchor.Y {_old_y9} -> {_anc9.YCoordinate}")
# ─────────────────────────────────────────────────────────────────────────────

# fix base anchor cls=1 สำหรับ ำ และ า
# เมื่อใช้ composite ำ = า + ํ แล้ว GSUB จะ decompose ค่ำ → ค + ่ + ํ + า
# วรรณยุกต์ ่ จะแขวนบน นิคหิต (ํ) ผ่าน GPOS mark-to-base
# ดังนั้นต้อง fix anchor ของ นิคหิต (uni0E4D) ให้ถูก
# และ fix anchor ของ า (uni0E32) ให้ถูกด้วย (สำหรับกรณีอื่น)
cmap2=font2.getBestCmap()

def fix_base_anchor_y(font2, gname, new_y):
    """Update GPOS base anchor class=1 Y coordinate for a given glyph."""
    if not gname: return
    gpos2=font2['GPOS'].table
    for lk2 in gpos2.LookupList.Lookup:
        if lk2.LookupType!=4: continue
        for sub2 in lk2.SubTable:
            if gname not in sub2.BaseCoverage.glyphs: continue
            idx2=sub2.BaseCoverage.glyphs.index(gname)
            rec2=sub2.BaseArray.BaseRecord[idx2]
            if len(rec2.BaseAnchor)>1 and rec2.BaseAnchor[1]:
                rec2.BaseAnchor[1].YCoordinate=new_y
                print(f"  anchor fix: {gname} cls1 Y → {new_y}")

# Fix anchor for ำ using nikhahit's yMax (since วรรณยุกต์ attaches above ํ in ำ)
gname_nik2 = cmap2.get(0x0E4D,'')  # ํ
gname_am2  = cmap2.get(0x0E33,'')  # ำ
gname_aa2  = cmap2.get(0x0E32,'')  # า
has_drawn_nik = chr(0x0E4D) in glyphs_data and glyphs_data[chr(0x0E4D)]
has_drawn_aa  = chr(0x0E32) in glyphs_data and glyphs_data[chr(0x0E32)]

if has_drawn_nik and gname_nik2:
    gg_nik2 = font2['glyf'].get(gname_nik2)
    if gg_nik2 and hasattr(gg_nik2,'yMax') and gg_nik2.yMax:
        # anchor for ำ should be at nikhahit's top so วรรณยุกต์ clears it
        fix_base_anchor_y(font2, gname_am2, gg_nik2.yMax + 40)
        # also fix ํ itself as a base (some sequences use it directly)
        fix_base_anchor_y(font2, gname_nik2, gg_nik2.yMax + 40)

if has_drawn_aa and gname_aa2:
    gg_aa2 = font2['glyf'].get(gname_aa2)
    if gg_aa2 and hasattr(gg_aa2,'yMax') and gg_aa2.yMax:
        fix_base_anchor_y(font2, gname_aa2, gg_aa2.yMax + 40)

# legacy: if user drew ำ directly (old behaviour), still fix its anchor
gname_sara=gname_am2
if gname_sara and 'ำ' in glyphs_data and glyphs_data['ำ'] and not (has_drawn_nik and has_drawn_aa):
    gg_sara=font2['glyf'].get(gname_sara)
    if gg_sara and hasattr(gg_sara,'yMax') and gg_sara.yMax:
        fix_base_anchor_y(font2, gname_sara, gg_sara.yMax+40)

# ─── สระอุ/อู — เลื่อน mark anchor Y ลง ────────────────────────────────────
# mark anchor Y=0 ทำให้ ุ/ู วางตรง baseline พอดี
# ลดเป็น Y=-100 เพื่อให้ห้อยต่ำกว่า baseline ลงไปอีก
SARA_U_LOWER   = 200   # ยิ่งบวกมาก ยิ่งต่ำลง
SARA_U_SHIFT_X = -120  # ยิ่งลบมาก ยิ่งเยื้องซ้าย (Sarabun default = -74)
gname_u2  = font2.getBestCmap().get(0x0E38)  # ุ
gname_uu2 = font2.getBestCmap().get(0x0E39)  # ู
gpos3 = font2['GPOS'].table
for lk3 in gpos3.LookupList.Lookup:
    if lk3.LookupType != 4: continue
    for sub3 in lk3.SubTable:
        for i3, gn3 in enumerate(sub3.MarkCoverage.glyphs):
            if gn3 in (gname_u2, gname_uu2):
                anc3 = sub3.MarkArray.MarkRecord[i3].MarkAnchor
                anc3.YCoordinate = SARA_U_LOWER
                anc3.XCoordinate = anc3.XCoordinate + SARA_U_SHIFT_X_OFFSET
                print(f"  {gn3} mark anchor X={SARA_U_SHIFT_X} Y={SARA_U_LOWER}")
        # Also update base anchor class=0 (below-base) to match yMin of drawn glyphs
        # So that ุ/ู sits just below the consonant's actual bottom
        if hasattr(sub3, 'BaseCoverage') and hasattr(sub3, 'BaseArray'):
            for bi, bgname in enumerate(sub3.BaseCoverage.glyphs):
                gg = font2['glyf'].get(bgname)
                if gg and hasattr(gg, 'yMin') and gg.yMin is not None and gg.yMin < 0:
                    brec = sub3.BaseArray.BaseRecord[bi]
                    if brec.BaseAnchor and len(brec.BaseAnchor) > 0 and brec.BaseAnchor[0]:
                        # Only update class=0 anchor (below-base) — Y should be at yMin
                        brec.BaseAnchor[0].YCoordinate = gg.yMin

# ─────────────────────────────────────────────────────────────────────────────

# อัปเดต hmtx ด้วย spacing_data ที่กำหนด + DEFAULT_RSB_REDUCE
# ลด advance เฉพาะ base glyph ที่วาดแล้ว (ไม่ใช่ mark)
cmap2=font2.getBestCmap()
base_gnames=set(cmap2.values())-set(mark_anchors.keys())
for gname3 in base_gnames:
    if gname3 not in font2['hmtx'].metrics: continue
    adv3,lsb3=font2['hmtx'].metrics[gname3]
    if adv3 <= 0: continue
    # ลดเฉพาะตัวที่ advance เหลือพอหลังลด (>= 300)
    new_adv3=adv3-DEFAULT_RSB_REDUCE
    if new_adv3 >= 300:
        font2['hmtx'].metrics[gname3]=(new_adv3, lsb3)
    elif adv3 > DEFAULT_RSB_REDUCE:
        # ลดครึ่งเดียวสำหรับตัวแคบ
        font2['hmtx'].metrics[gname3]=(max(lsb3+50, adv3-DEFAULT_RSB_REDUCE//2), lsb3)
for ch2,sp2 in spacing_data.items():
    if not sp2: continue
    cp2=ord(ch2);gname2=font2.getBestCmap().get(cp2)
    if not gname2: continue
    if gname2 not in font2['hmtx'].metrics: continue
    gg2=font2['glyf'][gname2]
    if not hasattr(gg2,'xMax') or gg2.xMax is None: continue
    glyph_w2=gg2.xMax-gg2.xMin
    sarabunAdv2=font['hmtx'].metrics.get(gname2,(310,0))[0]
    sarabunLsb2=font['hmtx'].metrics.get(gname2,(310,0))[1]
    lsb_f=int(sp2.get('lsb', sarabunLsb2))
    rsb_f=int(sp2.get('rsb', max(0, sarabunAdv2-sarabunLsb2-glyph_w2)))
    new_adv2=lsb_f+glyph_w2+rsb_f
    font2['hmtx'].metrics[gname2]=(max(0,new_adv2), lsb_f)
# clamp ทุก advance ไม่ให้ติดลบก่อน save
for gn_f in font2['hmtx'].metrics:
    adv_f, lsb_f2 = font2['hmtx'].metrics[gn_f]
    if adv_f < 0:
        font2['hmtx'].metrics[gn_f] = (0, lsb_f2)
# save ครั้งสอง
buf2=io.BytesIO();font2.save(buf2)
base64.b64encode(buf2.getvalue()).decode()</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const THAI   = "กขฃคฅฆงจฉชซฌญฎฏฐฑฒณดตถทธนบปผฝพฟภมยรลวศษสหฬอฮฤฦ".split("");
const THAI_V = "ะาิีึืุูำัเแโใไอ็ํฺๆฯ์".split("");  // สระ+วรรณยุกต์+เครื่องหมาย
const THAI_TONE = "่้๊๋".split("");  // วรรณยุกต์แยกต่างหาก
const LATIN  = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz".split("");
const NUMS   = "0123456789".split("");
const PUNCT  = "!?.,;:\"'()-–/".split("");
const ALL_CHARS = [...THAI, ...THAI_V, ...THAI_TONE, ...LATIN, ...NUMS, ...PUNCT];

const GROUPS = [
  { label: "ก–ฮ",  chars: THAI,       color: "#4f8ef7" },
  { label: "สระ",  chars: THAI_V,     color: "#a855f7" },
  { label: "วรร",  chars: THAI_TONE,  color: "#ec4899" },
  { label: "A–Z",  chars: LATIN,      color: "#10b981" },
  { label: "0–9",  chars: NUMS,       color: "#f59e0b" },
  { label: "!?.,", chars: PUNCT,      color: "#ef4444" },
];

const CW = 240, CH = 300, BASELINE = 230;

function DrawCanvas({ char, paths, onChange, showGuide, penWidth = 6 }) {
  const ref    = useRef(null);
  const active = useRef(false);
  const cur    = useRef([]);

  const paint = useCallback((ps) => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, CW, CH);
    ctx.fillStyle = "#fafafa";
    ctx.fillRect(0, 0, CW, CH);

    if (showGuide) {
      ctx.fillStyle = "rgba(200,230,255,0.18)"; ctx.fillRect(0, 0,   CW, 60);
      ctx.fillStyle = "rgba(255,240,200,0.18)"; ctx.fillRect(0, 60,  CW, 160);
      ctx.fillStyle = "rgba(255,200,200,0.15)"; ctx.fillRect(0, 220, CW, 80);

      [[60,"#c0d8f0"],[140,"#c0d8f0"],[BASELINE,"#4f8ef7"],[260,"#f0c0c0"]].forEach(([y, c]) => {
        ctx.strokeStyle = c; ctx.lineWidth = y === BASELINE ? 1.5 : 0.8;
        ctx.setLineDash(y === BASELINE ? [] : [5,5]);
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CW,y); ctx.stroke();
      });
      ctx.setLineDash([]);

      const isThai = /[\u0E00-\u0E7F]/.test(char);
      // คำนวณ fontSize ให้ ascender ของ Sarabun (1068/1000) พอดีเส้นประบน (Y=60)
      // BASELINE=230, ascender_line=60 → zone=170px, scale=1068/1000
      const fontSize = isThai ? Math.round((BASELINE - 60) / (1068/1000)) : 140;
      ctx.font = `${fontSize}px 'Sarabun', 'Noto Sans Thai', serif`;
      ctx.textBaseline = "alphabetic";
      // สระ/วรรณยุกต์ลอย (เช่น ี, ่, ้) มี advance width = 0 ใน Canvas —
      // ถ้าใช้ textAlign="center" ตัว Canvas จะ center โดยอิง advance (=0) ทำให้หมึกจริง
      // (ซึ่งอยู่ทางซ้ายของจุด origin ทั้งหมด) เลื่อนไปทางซ้ายของเส้นกลางจริงๆ เกือบ 20%
      // ของ canvas — เป็นสาเหตุที่ guide สอนให้วาดเยื้องไปข้างหน้า
      // แก้โดยวัด "หมึกจริง" ด้วย actualBoundingBoxLeft/Right (ไม่สนใจ advance width)
      // แล้วเลื่อนตำแหน่งวาดให้หมึกจริงอยู่กึ่งกลาง canvas เป๊ะ ใช้ได้ทั้งตัวอักษรปกติ
      // และสระ/วรรณยุกต์ลอยเหมือนกัน
      ctx.textAlign = "left";
      const m = ctx.measureText(char);
      const inkLeft = -m.actualBoundingBoxLeft;
      const inkWidth = m.actualBoundingBoxLeft + m.actualBoundingBoxRight;
      const guideX = CW / 2 - (inkLeft + inkWidth / 2);
      ctx.fillStyle = "rgba(100,160,255,0.08)";
      ctx.fillText(char, guideX, BASELINE);
      ctx.strokeStyle = "rgba(100,160,255,0.18)";
      ctx.lineWidth = 1;
      ctx.strokeText(char, guideX, BASELINE);
    }


    ctx.strokeStyle = "#111";
    ctx.fillStyle = "#111";
    ctx.lineWidth = penWidth * 0.58; // ให้ใกล้เคียงสัดส่วนความหนาที่จะได้ตอน build font จริง
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ps.forEach(path => {
      if (path.length === 1) {
        // จุดเดียว (tap) → วาดเป็นวงกลมเล็ก ขนาดตามความหนาปากกา
        ctx.beginPath();
        ctx.arc(path[0].x, path[0].y, Math.max(3, penWidth * 0.65), 0, Math.PI * 2);
        ctx.fill();
        return;
      }
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) {
        const mx = (path[i-1].x + path[i].x) / 2;
        const my = (path[i-1].y + path[i].y) / 2;
        ctx.quadraticCurveTo(path[i-1].x, path[i-1].y, mx, my);
      }
      ctx.lineTo(path[path.length-1].x, path[path.length-1].y);
      ctx.stroke();
    });
  }, [showGuide, char, penWidth]);

  useEffect(() => { paint(paths); }, [paths, paint]);

  const pos = (e) => {
    const r = ref.current.getBoundingClientRect();
    const sx = CW / r.width, sy = CH / r.height;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx - r.left) * sx, y: (cy - r.top) * sy };
  };

  const down = (e) => { e.preventDefault(); active.current = true; cur.current = [pos(e)]; };
  const move = (e) => {
    e.preventDefault(); if (!active.current) return;
    cur.current.push(pos(e));
    paint([...paths, cur.current]);
  };
  const up = (e) => {
    e.preventDefault(); if (!active.current) return;
    active.current = false;
    if (cur.current.length >= 1) onChange([...paths, cur.current]); // >= 1 รองรับจุด
    cur.current = [];
  };

  return (
    <canvas ref={ref} width={CW} height={CH}
      style={{ width:"100%", height:"100%", touchAction:"none", cursor:"crosshair", display:"block" }}
      onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={up}
      onTouchStart={down} onTouchMove={move} onTouchEnd={up}
    />
  );
}

function MiniGlyph({ char, paths, size = 44, penWidth = 6 }) {
  const done = paths && paths.length > 0;
  if (!done) return (
    <span style={{ fontSize: size * 0.38, color: "#ccc", fontFamily: "'Sarabun',serif", lineHeight:1 }}>{char}</span>
  );
  const sc = size / CH;
  const sw = penWidth * 1.5; // สัดส่วนเดิม: 9 ตอน penWidth เริ่มต้น 6
  return (
    <svg width={CW * sc} height={size} viewBox={`0 0 ${CW} ${CH}`} style={{ overflow:"visible" }}>
      {paths.map((path, pi) => {
        if (path.length === 1) {
          // จุดเดียว → circle ใน SVG
          return <circle key={pi} cx={path[0].x} cy={path[0].y} r={Math.max(3, sw*0.55)} fill="#111"/>;
        }
        let d = `M${path[0].x} ${path[0].y}`;
        for (let i = 1; i < path.length; i++) {
          const mx = (path[i-1].x + path[i].x) / 2;
          const my = (path[i-1].y + path[i].y) / 2;
          d += ` Q${path[i-1].x} ${path[i-1].y} ${mx} ${my}`;
        }
        d += ` L${path[path.length-1].x} ${path[path.length-1].y}`;
        return <path key={pi} d={d} fill="none" stroke="#111" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"/>;
      })}
    </svg>
  );
}

  const buildFont = () => {
    if (!window.opentype) return null;
    const UPM = SARABUN.meta.upem; // 1000 — ใช้ของ Sarabun จริงๆ
    const SCALE = UPM / CH;
    const fy = (y) => (BASELINE - y) * SCALE;
    const fx = (x) => x * SCALE;

    const notdefPath = new opentype.Path();
    notdefPath.moveTo(100,0); notdefPath.lineTo(100,700);
    notdefPath.lineTo(500,700); notdefPath.lineTo(500,0); notdefPath.closePath();
    const glyphList = [new opentype.Glyph({ name:".notdef", unicode:0, advanceWidth:600, path:notdefPath })];

    // space — ใช้ advance จาก Sarabun
    glyphList.push(new opentype.Glyph({ name:"space", unicode:32, advanceWidth:SARABUN.advance["32"]||243, path:new opentype.Path() }));

    Object.entries(glyphs).forEach(([ch, paths]) => {
      if (!paths || paths.length === 0) return;
      const cp = ch.charCodeAt(0);

      // mark glyph (สระ/วรรณยุกต์) = advance 0 ใน Sarabun → ไม่ shift เพราะ position อ้างอิง base
      const sarabunAdv = SARABUN.advance[String(cp)];
      const isMark = sarabunAdv === 0;

      // หา shiftX
      let shiftX = 0;
      if (isMark) {
        // ผู้ใช้วาดทับ skeleton → center ของ drawn ตรงกับ center ของ Sarabun mark
        const mc = SARABUN.markCenter?.[String(cp)];
        const sarabunCX = mc ? mc.cx : (SARABUN.markAnchor[String(cp)]?.x ?? -74);
        let minX = Infinity, maxX = -Infinity;
        paths.forEach(path => path.forEach(pt => {
          const x = fx(pt.x);
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
        }));
        if (isFinite(minX)) shiftX = (minX + maxX) / 2 - sarabunCX;
      } else {
        // base glyph: shift ซ้ายให้ชิด lsb=20
        let minX = Infinity;
        paths.forEach(path => path.forEach(pt => { const x = fx(pt.x); if (x < minX) minX = x; }));
        if (isFinite(minX)) shiftX = Math.max(0, minX - 20);
      }

      const op = new opentype.Path();
      paths.forEach(path => {
        if (path.length === 1) {
          const cx=fx(path[0].x)-shiftX, cy=fy(path[0].y), r=20;
          op.moveTo(cx+r,cy);
          op.bezierCurveTo(cx+r,cy+r*0.55,cx+r*0.55,cy+r,cx,cy+r);
          op.bezierCurveTo(cx-r*0.55,cy+r,cx-r,cy+r*0.55,cx-r,cy);
          op.bezierCurveTo(cx-r,cy-r*0.55,cx-r*0.55,cy-r,cx,cy-r);
          op.bezierCurveTo(cx+r*0.55,cy-r,cx+r,cy-r*0.55,cx+r,cy);
          op.closePath(); return;
        }
        const sw = penWeight*SCALE, pts = path;
        const normals = [];
        for (let i=0; i<pts.length-1; i++) {
          const dx=pts[i+1].x-pts[i].x, dy=pts[i+1].y-pts[i].y;
          const len=Math.sqrt(dx*dx+dy*dy)||1;
          normals.push({ nx:-dy/len, ny:dx/len });
        }
        normals.push(normals[normals.length-1]);
        op.moveTo(fx(pts[0].x)-shiftX+normals[0].nx*sw, fy(pts[0].y)-normals[0].ny*sw);
        for (let i=1; i<pts.length; i++) op.lineTo(fx(pts[i].x)-shiftX+normals[i].nx*sw, fy(pts[i].y)-normals[i].ny*sw);
        for (let i=pts.length-1; i>=0; i--) op.lineTo(fx(pts[i].x)-shiftX-normals[i].nx*sw, fy(pts[i].y)+normals[i].ny*sw);
        op.closePath();
      });

      // advanceWidth จาก Sarabun
      const advanceWidth = sarabunAdv !== undefined
        ? (isMark ? 0 : Math.max(sarabunAdv, 50))
        : Math.round(CW * SCALE * 0.6);

      glyphList.push(new opentype.Glyph({
        name:`uni${cp.toString(16).toUpperCase().padStart(4,"0")}`,
        unicode: cp, advanceWidth, path: op
      }));
    });

    if (glyphList.length <= 2) return null;
    return new opentype.Font({
      familyName:"MyHandFont", styleName:"Regular",
      unitsPerEm: UPM,
      ascender: SARABUN.meta.ascender,
      descender: SARABUN.meta.descender,
      glyphs: glyphList,
      // บอก browser ว่ารองรับ Thai script
      fsSelection: 0x40,
      ulUnicodeRange1: 0x00000001 | (1 << 24), // Thai bit 24
      ulCodePageRange1: (1 << 16), // Thai code page
    });
  };

  // inject @font-face — ใช้ Sarabun เป็น base แล้วแทนที่ glyph ที่วาด

    if (!window.opentype) { alert("opentype.js ยังโหลดไม่เสร็จ"); return; }
    if (Object.keys(glyphs).length === 0) { alert("ยังไม่มีตัวอักษรที่วาดครับ"); return; }

    // โหลด Sarabun จาก base64 ที่ฝังไว้
    const b64 = document.getElementById("sarabun-ttf").textContent.trim();
    const bin = atob(b64);
    const ab = new ArrayBuffer(bin.length);
    const ua = new Uint8Array(ab);
    for (let i=0; i<bin.length; i++) ua[i] = bin.charCodeAt(i);
    const sarabunFont = opentype.parse(ab);

    const UPM = sarabunFont.unitsPerEm;
    const SCALE = UPM / CH;
    const fy = (y) => (BASELINE - y) * SCALE;
    const fx = (x) => x * SCALE;

    // วน loop ตัวอักษรที่วาดแล้ว → แทนที่ glyph path ใน Sarabun
    Object.entries(glyphs).forEach(([ch, paths]) => {
      if (!paths || paths.length === 0) return;
      const cp = ch.charCodeAt(0);

      // หา glyph ใน Sarabun
      const sarabunGlyph = sarabunFont.charToGlyph(ch);
      if (!sarabunGlyph) return;

      const sarabunAdv = SARABUN.advance[String(cp)];
      const isMark = sarabunAdv === 0;

      // คำนวณ shiftX
      let shiftX = 0;
      if (!isMark) {
        let minX = Infinity;
        paths.forEach(path => path.forEach(pt => { const x = fx(pt.x); if (x < minX) minX = x; }));
        if (isFinite(minX)) shiftX = Math.max(0, minX - 20);
      } else {
        // mark: center ของ drawn ตรงกับ center ของ Sarabun mark
        const mc2 = SARABUN.markCenter?.[String(cp)];
        const sarabunCX2 = mc2 ? mc2.cx : (SARABUN.markAnchor[String(cp)]?.x ?? -74);
        let minX2 = Infinity, maxX2 = -Infinity;
        paths.forEach(path => path.forEach(pt => {
          const x = fx(pt.x);
          if (x < minX2) minX2 = x;
          if (x > maxX2) maxX2 = x;
        }));
        if (isFinite(minX2)) shiftX = (minX2 + maxX2) / 2 - sarabunCX2;
      }

      // สร้าง path ใหม่
      const op = new opentype.Path();
      paths.forEach(path => {
        if (path.length === 1) {
          const cx=fx(path[0].x)-shiftX, cy=fy(path[0].y), r=20;
          op.moveTo(cx+r,cy);
          op.bezierCurveTo(cx+r,cy+r*0.55,cx+r*0.55,cy+r,cx,cy+r);
          op.bezierCurveTo(cx-r*0.55,cy+r,cx-r,cy+r*0.55,cx-r,cy);
          op.bezierCurveTo(cx-r,cy-r*0.55,cx-r*0.55,cy-r,cx,cy-r);
          op.bezierCurveTo(cx+r*0.55,cy-r,cx+r,cy-r*0.55,cx+r,cy);
          op.closePath(); return;
        }
        const sw=penWeight*SCALE, pts=path;
        const normals=[];
        for (let i=0;i<pts.length-1;i++) {
          const dx=pts[i+1].x-pts[i].x, dy=pts[i+1].y-pts[i].y;
          const len=Math.sqrt(dx*dx+dy*dy)||1;
          normals.push({nx:-dy/len,ny:dx/len});
        }
        normals.push(normals[normals.length-1]);
        op.moveTo(fx(pts[0].x)-shiftX+normals[0].nx*sw, fy(pts[0].y)-normals[0].ny*sw);
        for (let i=1;i<pts.length;i++) op.lineTo(fx(pts[i].x)-shiftX+normals[i].nx*sw, fy(pts[i].y)-normals[i].ny*sw);
        for (let i=pts.length-1;i>=0;i--) op.lineTo(fx(pts[i].x)-shiftX-normals[i].nx*sw, fy(pts[i].y)+normals[i].ny*sw);
        op.closePath();
      });

      // แทนที่ path ใน Sarabun glyph โดยตรง — glyph ID ยังเดิม GPOS ทำงานถูก!
      sarabunGlyph.path = op;
    });

    sarabunFont.names.fontFamily = {en: "MyHandFont"};
    sarabunFont.names.fullName = {en: "MyHandFont Regular"};
    sarabunFont.names.postScriptName = {en: "MyHandFont-Regular"};

    // export แล้ว inject @font-face
    const outAb = sarabunFont.toArrayBuffer();
    const outBytes = new Uint8Array(outAb);
    let outB64 = "";
    for (let i=0;i<outBytes.length;i++) outB64 += String.fromCharCode(outBytes[i]);
    setLiveFont(btoa(outB64));

              🔤 Export Font (.otf) — ใช้งานได้เลย!
            </button>
            <button onClick={() => onQuickExport ? onQuickExport() : (onBuild && onBuild())} style={{ padding:"13px", background:"linear-gradient(135deg,#1a0a5c,#4a2f9a)", color:"#fff", border:"none", borderRadius:10, fontWeight:800, fontSize:15, cursor:"pointer", marginBottom:4 }}>
              🔨 Build &amp; Export TTF
            </button>
          </div>
          <div style={{ marginTop:12, fontSize:12, color:"#aaa", lineHeight:1.8 }}>
            💡 ข้อมูลถูกบันทึกใน browser อัตโนมัติ<br/>
            ปิดแล้วเปิดใหม่ก็ยังอยู่ครับ
          </div>
        </div>
      </div>
    </div>
  );
}



function BuildScreen({ glyphs, onBack, autoExport, penWeight = 6, setPenWeight }) {
  const [pyReady, setPyReady] = React.useState(false);
  const [status, setStatus] = React.useState('กำลังโหลด Pyodide + fonttools...');
  const [stCls, setStCls] = React.useState('');
  const [progress, setProgress] = React.useState(0);
  const [fontB64, setFontB64] = React.useState(null);
  const [pvText, setPvText] = React.useState('ที่ ท่อ ก้อง วันที่ ตั้งแต่ เมื่อวาน สวัสดี Hello 123');
  const [fs, setFs] = React.useState(36);
  const [ls, setLs] = React.useState(0);
  const [ws, setWs] = React.useState(0);
  const [lsb, setLsb] = React.useState(20);
  const [saraUX, setSaraUX] = React.useState(0);  // offset จาก Sarabun default
  const [building, setBuilding] = React.useState(false);
  const [spacing, setSpacing] = React.useState(() => {
    try {
      const s = localStorage.getItem('fontmaker_spacing');
      return s ? JSON.parse(s) : {};
    } catch(e) { return {}; }
  });
  const [editChar, setEditChar] = React.useState(null);
  // keep editChar alive across builds
  const editCharRef = React.useRef(null);
  const setEditCharSafe = (c) => { editCharRef.current = c; setEditChar(c); };
  React.useEffect(() => {
    // restore editChar after build completes
    if (!building && editCharRef.current) setEditChar(editCharRef.current);
  }, [building]);

  // sync spacing to localStorage
  React.useEffect(() => {
    try { localStorage.setItem('fontmaker_spacing', JSON.stringify(spacing)); } catch(e) {}
  }, [spacing]);
  const pyRef = React.useRef(null);

  const st = (msg, cls) => { setStatus(msg); setStCls(cls||''); };

  React.useEffect(() => {
    async function init() {
      try {
        setProgress(20);
        const py = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/" });
        setProgress(60); st('ติดตั้ง fonttools...');
        await py.loadPackage(['micropip']);
        await py.runPythonAsync("import micropip; await micropip.install('fonttools')");
        pyRef.current = py;
        setPyReady(true);
        setProgress(100); st('✅ พร้อมแล้ว!', 'ok');
        setTimeout(() => setProgress(0), 600);
      } catch(e) { st('❌ ' + e.message, 'err'); setProgress(0); }
    }
    init();
  }, []);

  const buildFont = async () => {
    if (!pyRef.current) return;
    setBuilding(true); st('กำลัง build...'); setProgress(20);
    window.glyphsJson = JSON.stringify(glyphs);
    window.spacingJson = JSON.stringify(spacing);
    console.log('spacing being sent:', spacing);
    console.log('spacingJson:', window.spacingJson);
    window.sarabunB64 = document.getElementById('sarabun-ttf').textContent.trim();
    window.lsbVal = String(lsb);
    window.saraUX = String(saraUX);
    window.penWeight = String(penWeight);
    try {
      setProgress(50);
      const code = document.getElementById('py-build').textContent;
      const b64 = await pyRef.current.runPythonAsync(code);
      setProgress(90); setFontB64(b64);
      let el = document.getElementById('dyn-font');
      if (!el) { el = document.createElement('style'); el.id = 'dyn-font'; document.head.appendChild(el); }
      el.textContent = "@font-face{font-family:'MyHandFont';src:url('data:font/ttf;base64," + b64 + "') format('truetype')}";
      setProgress(100); st('✅ Build สำเร็จ!', 'ok');
      setTimeout(() => setProgress(0), 600);
    } catch(e) { st('❌ ' + e.message, 'err'); setProgress(0); console.error(e); }
    setBuilding(false);
  };

  const exportTTF = () => {
    if (!fontB64) return;
    const bin = atob(fontB64), ab = new ArrayBuffer(bin.length), ua = new Uint8Array(ab);
    for (let i = 0; i < bin.length; i++) ua[i] = bin.charCodeAt(i);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([ab], { type: 'font/ttf' }));
    a.download = 'MyHandFont.ttf'; a.click();
  };

  // โหมด "Build & Export TTF" แบบไว — ไม่ต้องกดปุ่มเองในหน้านี้
  React.useEffect(() => {
    if (autoExport && pyReady && !building && !fontB64) buildFont();
  }, [autoExport, pyReady, building, fontB64]);
  React.useEffect(() => {
    if (autoExport && fontB64) {
      exportTTF();
      setTimeout(() => onBack && onBack(), 400);
    }
  }, [autoExport, fontB64]);

  const done = Object.keys(glyphs).filter(c => (glyphs[c]||[]).length > 0).length;

  return (
    <div className="bscreen">
      <div className="bhdr">
        <button onClick={onBack} style={{background:'none',border:'none',color:'#a89de8',fontSize:24,cursor:'pointer'}}>&#8249;</button>
        <div>
          <div style={{fontWeight:800,fontSize:17}}>Build &amp; Export Font</div>
          <div style={{fontSize:12,opacity:0.6}}>{done} ตัวอักษร</div>
        </div>
      </div>
      <div className="bbody">
        <div className="bc">
          <div className="pgbar"><div className="pgfill" style={{width:progress+'%'}}></div></div>
          <div className={'bst ' + stCls}>{status}</div>
          <button className="gbtn" style={{background:'#1a0a5c',color:'#fff',marginTop:8}}
            onClick={buildFont} disabled={!pyReady || building}>
            {building ? '⏳ กำลัง build...' : '🔨 Build Font'}
          </button>
          {fontB64 && (
            <button className="gbtn" style={{background:'#10b981',color:'#fff'}} onClick={exportTTF}>
              💾 Export TTF
            </button>
          )}
        </div>
        <div className="bc">
          <h3>ปรับ Spacing</h3>
          <div className="srow"><label>ขนาด</label><input type="range" min="20" max="60" value={fs} onChange={e=>setFs(+e.target.value)}/><span>{fs}px</span></div>
          <div className="srow"><label>Letter Spacing</label><input type="range" min="-8" max="8" step="0.5" value={ls} onChange={e=>setLs(+e.target.value)}/><span>{ls}px</span></div>
          <div className="srow"><label>Word Spacing</label><input type="range" min="-8" max="16" step="0.5" value={ws} onChange={e=>setWs(+e.target.value)}/><span>{ws}px</span></div>
          <div className="srow"><label>Glyph LSB</label><input type="range" min="0" max="80" step="5" value={lsb} onChange={e=>setLsb(+e.target.value)}/><span>{lsb}u</span></div>
          <div className="srow"><label>อุ อู เยื้องซ้าย</label><input type="range" min="-200" max="200" step="10" value={saraUX} onChange={e=>setSaraUX(+e.target.value)}/><span>{saraUX}u</span></div>
          <div className="srow"><label>ความหนาปากกา</label><input type="range" min="2" max="16" step="0.5" value={penWeight} onChange={e=>setPenWeight && setPenWeight(+e.target.value)}/><span>{penWeight}</span></div>
          <div style={{fontSize:12,color:'#aaa',marginTop:4}}>เปลี่ยน LSB หรือความหนาปากกา ต้อง Build ใหม่ครับ</div>
        </div>
        <div className="bc">
          <h3>Preview</h3>
          <textarea value={pvText} onChange={e=>setPvText(e.target.value)}
            style={{width:'100%',padding:'8px 10px',border:'1.5px solid #e8e8e8',borderRadius:8,fontSize:15,fontFamily:"'Sarabun',serif",resize:'none',outline:'none',marginBottom:12}} rows={2}/>
          <div style={{fontSize:11,color:'#aaa',fontWeight:700,letterSpacing:1,marginBottom:6}}>✍️ MY FONT</div>
          <div className="pvtext" style={{fontFamily:fontB64?"'MyHandFont',serif":"inherit",color:'#1a1a2e',fontSize:fs+'px',...(ls?{letterSpacing:ls+'px'}:{}),...(ws?{wordSpacing:ws+'px'}:{}),opacity:fontB64?1:0.3}}>{pvText}</div>


          {fontB64 && (() => {
            const uChars = [...new Set(pvText.split('').filter(c => c.trim() && (glyphs[c]||[]).length>0))];
            if (!uChars.length) return null;
            return (
              <div style={{marginTop:14,borderTop:'1px solid #f0f0f0',paddingTop:12}}>
                <div style={{fontSize:11,color:'#aaa',fontWeight:700,letterSpacing:1,marginBottom:8}}>✏️ ปรับ SIDE BEARING — กดตัวอักษรที่อยากแก้</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
                  {uChars.map(c => {
                    const sel = editChar===c;
                    const custom = spacing[c] && (spacing[c].lsb!==undefined||spacing[c].rsb!==undefined);
                    return (
                      <button key={c} onClick={()=>setEditCharSafe(sel?null:c)} style={{
                        width:42,height:42,borderRadius:8,fontFamily:"'MyHandFont',serif",fontSize:22,
                        border:`2px solid ${sel?'#4f8ef7':custom?'#10b981':'#e8e8e8'}`,
                        background:sel?'#eef4ff':custom?'#f0fdf4':'#fafafa',
                        color:sel?'#4f8ef7':custom?'#10b981':'#333',cursor:'pointer'
                      }}>{c}</button>
                    );
                  })}
                </div>
                {editChar && (
                  <div style={{background:'#f8f9ff',borderRadius:10,padding:12,border:'1.5px solid #e0e8ff'}}>
                    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
                      <div style={{fontFamily:"'MyHandFont',serif",fontSize:52,lineHeight:1}}>{editChar}</div>
                      <div style={{flex:1,fontSize:12,color:'#888'}}>U+{editChar.charCodeAt(0).toString(16).toUpperCase().padStart(4,'0')}</div>
                      {spacing[editChar] && (
                        <button onClick={()=>setSpacing(p=>{const n={...p};delete n[editChar];return n;})}
                          style={{fontSize:11,color:'#e53e3e',border:'1px solid #fca5a5',borderRadius:6,padding:'3px 8px',background:'#fff5f5',cursor:'pointer'}}>
                          reset
                        </button>
                      )}
                    </div>
                    {[['LSB ซ้าย','lsb',-100,200],['RSB ขวา','rsb',-100,300]].map(([label,key,mn,mx])=>{
                      const cur=spacing[editChar]?.[key]??(key==='lsb'?lsb:50);
                      return (
                        <div key={key} style={{marginBottom:8}}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                            <label style={{fontSize:12,color:'#555',fontWeight:600}}>{label}</label>
                            <span style={{fontSize:12,color:'#4f8ef7',fontWeight:700}}>{cur}u</span>
                          </div>
                          <input type="range" min={mn} max={mx} value={cur}
                            onChange={e=>setSpacing(p=>{const next={...p,[editChar]:{...(p[editChar]||{}),[key]:+e.target.value}};try{localStorage.setItem('fontmaker_spacing',JSON.stringify(next));}catch(err){}return next;})}
                            style={{width:'100%',accentColor:'#4f8ef7'}}/>
                        </div>
                      );
                    })}
                    {/* Live preview — แสดงตัวอักษรพร้อม spacing จำลอง */}
                    <div style={{marginTop:10,padding:'8px 0',borderTop:'1px solid #e8e8f0'}}>
                      <div style={{fontSize:11,color:'#aaa',marginBottom:6}}>ตัวอย่าง (จำลอง spacing)</div>
                      <div style={{display:'flex',alignItems:'flex-end',gap:0,background:'#fff',borderRadius:8,padding:'8px 12px',overflow:'hidden'}}>
                        {/* LSB space */}
                        <div style={{
                          width: Math.max(0, spacing[editChar]?.lsb ?? lsb) + 'px',
                          height:60, background:'rgba(79,142,247,0.1)',
                          borderRight:'2px dashed #4f8ef7',flexShrink:0,minWidth:2
                        }}/>
                        {/* glyph */}
                        <div style={{
                          fontFamily:"'MyHandFont',serif",fontSize:52,lineHeight:1,
                          color:'#1a1a2e',flexShrink:0,userSelect:'none'
                        }}>{editChar}</div>
                        {/* RSB space */}
                        <div style={{
                          width: Math.max(0, spacing[editChar]?.rsb ?? 50) + 'px',
                          height:60, background:'rgba(16,185,129,0.1)',
                          borderLeft:'2px dashed #10b981',flexShrink:0,minWidth:2
                        }}/>
                        <div style={{fontFamily:"'MyHandFont',serif",fontSize:52,lineHeight:1,color:'#ccc'}}>ก</div>
                      </div>
                      <div style={{display:'flex',gap:12,marginTop:4,fontSize:11}}>
                        <span style={{color:'#4f8ef7'}}>■ LSB = {spacing[editChar]?.lsb ?? lsb}u</span>
                        <span style={{color:'#10b981'}}>■ RSB = {spacing[editChar]?.rsb ?? 50}u</span>
                      </div>
                    </div>
                    <div style={{fontSize:11,color:'#aaa',marginTop:8}}>กด Build ใหม่เพื่อ apply จริงครับ</div>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

function AppRoot() {
  const [screen, setScreen] = React.useState('draw');
  const [autoExport, setAutoExport] = React.useState(false);
  // glyphs อยู่ที่นี่ตลอด ไม่หายเมื่อสลับหน้า
  const [glyphs, setGlyphs] = React.useState(() => {
    try {
      const s = localStorage.getItem('fontmaker_glyphs');
      return s ? JSON.parse(s) : {};
    } catch(e) { return {}; }
  });
  // ความหนาปากกา (สไตล์ปากกา) — ใช้ทั้งตอนวาด, preview, และตอน build font จริง
  const [penWeight, setPenWeight] = React.useState(() => {
    try {
      const s = localStorage.getItem('fontmaker_penweight');
      return s ? parseFloat(s) : 6;
    } catch(e) { return 6; }
  });

  // sync localStorage ทุกครั้งที่ glyphs เปลี่ยน
  React.useEffect(() => {
    try { localStorage.setItem('fontmaker_glyphs', JSON.stringify(glyphs)); } catch(e) {}
  }, [glyphs]);
  React.useEffect(() => {
    try { localStorage.setItem('fontmaker_penweight', String(penWeight)); } catch(e) {}
  }, [penWeight]);

  if (screen === 'build') {
    return <BuildScreen glyphs={glyphs} onBack={() => { setAutoExport(false); setScreen('draw'); }} autoExport={autoExport}
      penWeight={penWeight} setPenWeight={setPenWeight}/>;
  }
  return <App glyphs={glyphs} setGlyphs={setGlyphs} onBuild={() => setScreen('build')}
    onQuickExport={() => { setAutoExport(true); setScreen('build'); }}
    penWeight={penWeight} setPenWeight={setPenWeight}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot/>);

</script>
</body>
</html>
